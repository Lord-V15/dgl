<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ subject }}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #F5F0E8; font-family: Georgia, 'Times New Roman', serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #F5F0E8;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%;">

          <!-- Decorative top border -->
          <tr>
            <td style="height: 4px; background: linear-gradient(90deg, transparent, #D4AF37, transparent);"></td>
          </tr>

          <!-- Header -->
          <tr>
            <td align="center" style="
              background-color: #FFFDF5;
              padding: 40px 30px 20px;
              border-left: 1px solid #E8DCC8;
              border-right: 1px solid #E8DCC8;
            ">
              <div style="
                font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
                font-size: 12px;
                letter-spacing: 4px;
                text-transform: uppercase;
                color: #D4AF37;
                margin-bottom: 12px;
              ">A Letter for You</div>
              <h1 style="
                font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
                font-size: 28px;
                font-weight: 400;
                color: #2C1810;
                margin: 0;
                font-style: italic;
              ">Dearest Gentle Reader</h1>
              <div style="
                width: 60px;
                height: 1px;
                background-color: #D4AF37;
                margin: 20px auto 0;
              "></div>
            </td>
          </tr>

          <!-- Letter body -->
          <tr>
            <td style="
              background-color: #FFFDF5;
              padding: 30px 50px 40px;
              border-left: 1px solid #E8DCC8;
              border-right: 1px solid #E8DCC8;
            ">
              <!-- Subject line -->
              <p style="
                font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
                font-size: 20px;
                color: #2C1810;
                font-style: italic;
                margin: 0 0 24px;
                text-align: center;
              ">{{ subject }}</p>

              <!-- Body text -->
              <div style="
                font-family: Georgia, 'Times New Roman', serif;
                font-size: 16px;
                line-height: 1.8;
                color: #3D2B1F;
                white-space: pre-wrap;
              ">{{ body }}</div>

              <!-- Signature -->
              <div style="margin-top: 40px; text-align: right;">
                <p style="
                  font-family: Georgia, 'Times New Roman', serif;
                  font-size: 15px;
                  color: #3D2B1F;
                  margin: 0 0 4px;
                  font-style: italic;
                ">With all my love,</p>
                <p style="
                  font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
                  font-size: 22px;
                  color: #2C1810;
                  margin: 0;
                ">{{ sender_name }}</p>
              </div>
            </td>
          </tr>

          <!-- Decorative divider -->
          <tr>
            <td align="center" style="
              background-color: #FFFDF5;
              padding: 10px 30px 20px;
              border-left: 1px solid #E8DCC8;
              border-right: 1px solid #E8DCC8;
            ">
              <div style="
                width: 100%;
                height: 1px;
                background: linear-gradient(90deg, transparent, #D4AF37, transparent);
              "></div>
            </td>
          </tr>

          <!-- Footer with wax seal -->
          <tr>
            <td align="center" style="
              background-color: #FFFDF5;
              padding: 10px 30px 40px;
              border-left: 1px solid #E8DCC8;
              border-right: 1px solid #E8DCC8;
              border-bottom: 1px solid #E8DCC8;
            ">
              <div style="font-size: 36px; margin-bottom: 12px;">&#x1F48C;</div>
              <p style="
                font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
                font-size: 11px;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: #B8A080;
                margin: 0;
              ">Sealed with love</p>
              <p style="
                font-family: Georgia, 'Times New Roman', serif;
                font-size: 11px;
                color: #C4B398;
                margin: 10px 0 0;
              ">Sent via Dearest Gentle Reader</p>
            </td>
          </tr>

          <!-- Decorative bottom border -->
          <tr>
            <td style="height: 4px; background: linear-gradient(90deg, transparent, #D4AF37, transparent);"></td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
